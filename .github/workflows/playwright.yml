name: Login Monitoring

on:
  push:

  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        site:
          # - fox
          - foxhome
          - laline
          - itaybrands
          - footlocker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run login monitoring
        run: npx playwright test tests/critical --project=chromium --reporter=list
        env:
          SITE: ${{ matrix.site }}

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ matrix.site }}
          path: |
            test-results/
            playwright-report/